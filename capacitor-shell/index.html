<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#132226" />
    <title>Novoriq Flow</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #132226;
        --surface: rgba(255, 251, 244, 0.96);
        --ink: #152329;
        --ink-soft: #5c6c74;
        --brand: #c9a95a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(201, 169, 90, 0.18), transparent 28%),
          linear-gradient(180deg, #1b3035 0%, var(--bg) 100%);
        color: var(--ink);
      }
      .shell {
        width: min(100%, 420px);
        padding: 24px;
        border-radius: 24px;
        background: var(--surface);
        box-shadow: 0 24px 60px rgba(4, 11, 14, 0.32);
        display: grid;
        gap: 14px;
      }
      .mark {
        display: inline-grid;
        gap: 2px;
        width: fit-content;
        padding: 14px 16px;
        border-radius: 18px;
        background: linear-gradient(180deg, #132226 0%, #101a1d 100%);
        color: #fff8ee;
      }
      .mark span {
        font-size: 0.76rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 245, 224, 0.74);
      }
      .mark strong {
        font-size: 1.35rem;
        letter-spacing: -0.04em;
      }
      h1 { margin: 0; font-size: 1.6rem; line-height: 1.05; }
      p { margin: 0; color: var(--ink-soft); line-height: 1.6; }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 10px 14px;
        border-radius: 16px;
        background: linear-gradient(135deg, #d9bb72 0%, var(--brand) 100%);
        color: #231a0a;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="mark">
        <span>Novoriq</span>
        <strong>Flow</strong>
      </div>
      <h1>Launching workspace…</h1>
      <p>
        Novoriq Flow is configured to open the live BusinessOS experience from its
        hosted workspace.
      </p>
      <p>If you are seeing this page for long, check connectivity and reopen the app.</p>
      <a class="button" href="https://novoriqlimited.netlify.app/signin">Open Flow in browser</a>
    </main>
  </body>
</html>
