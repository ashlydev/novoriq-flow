<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#132226" />
    <title>Novoriq Flow Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #132226;
        --surface: rgba(255, 251, 244, 0.96);
        --ink: #152329;
        --ink-soft: #5c6c74;
        --brand: #c9a95a;
        --danger: #b44f40;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(201, 169, 90, 0.18), transparent 28%),
          linear-gradient(180deg, #1b3035 0%, var(--bg) 100%);
        color: var(--ink);
      }
      .shell {
        width: min(100%, 440px);
        padding: 24px;
        border-radius: 24px;
        background: var(--surface);
        box-shadow: 0 24px 60px rgba(4, 11, 14, 0.32);
        display: grid;
        gap: 14px;
      }
      .mark {
        display: inline-grid;
        gap: 2px;
        width: fit-content;
        padding: 14px 16px;
        border-radius: 18px;
        background: linear-gradient(180deg, #132226 0%, #101a1d 100%);
        color: #fff8ee;
      }
      .mark span {
        font-size: 0.76rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 245, 224, 0.74);
      }
      .mark strong {
        font-size: 1.35rem;
        letter-spacing: -0.04em;
      }
      h1 { margin: 0; font-size: 1.7rem; line-height: 1.05; }
      p { margin: 0; color: var(--ink-soft); line-height: 1.6; }
      .status {
        display: inline-flex;
        width: fit-content;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(180, 79, 64, 0.12);
        color: var(--danger);
        font-weight: 700;
        font-size: 0.82rem;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      button, a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 10px 14px;
        border-radius: 16px;
        border: 0;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
      }
      .primary {
        background: linear-gradient(135deg, #d9bb72 0%, var(--brand) 100%);
        color: #231a0a;
      }
      .secondary {
        background: rgba(21, 35, 41, 0.08);
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="mark">
        <span>Novoriq</span>
        <strong>Flow</strong>
      </div>
      <span class="status">Connection required</span>
      <h1>Flow could not reach the live workspace.</h1>
      <p>
        This Android build preserves the full deployed Novoriq Flow product through a
        secure hosted runtime. Reconnect to the internet and try again.
      </p>
      <div class="actions">
        <button class="primary" onclick="window.location.reload()">Retry</button>
        <a class="secondary" href="https://novoriqlimited.netlify.app/signin">Open in browser</a>
      </div>
    </main>
  </body>
</html>
