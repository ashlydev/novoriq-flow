databases:
  - name: novoriq-flow-db
    plan: basic-256mb
    databaseName: novoriq_flow
    user: novoriq

services:
  - type: web
    name: novoriq-flow
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: novoriq-flow-db
          property: connectionString
